<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <!-- Soft purple glow behind the mascot -->
    <radialGradient id="bg-glow" cx="50%" cy="52%" r="48%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="45%"  stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#374151" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Soft glow filter for ASCII art -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for title -->
    <filter id="title-glow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="400" height="280" rx="16" fill="#0D1117"/>
  <rect width="400" height="280" rx="16" fill="none" stroke="url(#border-grad)" stroke-width="1.2"/>
  <ellipse cx="200" cy="148" rx="170" ry="120" fill="url(#bg-glow)"/>

  <!-- ── Terminal chrome ── -->
  <rect x="1" y="1" width="398" height="34" rx="15" fill="#161B22"/>
  <rect x="1" y="20" width="398" height="15" fill="#161B22"/>
  <!-- Dots -->
  <circle cx="22" cy="17" r="5.5" fill="#FF5F57"/>
  <circle cx="40" cy="17" r="5.5" fill="#FEBC2E"/>
  <circle cx="58" cy="17" r="5.5" fill="#28C840"/>
  <!-- Window title -->
  <text x="200" y="22" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#6B7280" text-anchor="middle">~ audit-wizard</text>
  <!-- Separator line under chrome -->
  <line x1="0" y1="35" x2="400" y2="35" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ── Floating sparkles ── -->
  <circle cx="88"  cy="72"  r="2"   fill="#A78BFA" opacity="0.55"/>
  <circle cx="76"  cy="86"  r="1.3" fill="#C4B5FD" opacity="0.35"/>
  <circle cx="318" cy="68"  r="2"   fill="#A78BFA" opacity="0.55"/>
  <circle cx="326" cy="84"  r="1.3" fill="#C4B5FD" opacity="0.35"/>
  <circle cx="70"  cy="155" r="1.5" fill="#7C3AED" opacity="0.4"/>
  <circle cx="330" cy="148" r="1.5" fill="#7C3AED" opacity="0.4"/>
  <!-- ✦ star glyphs -->
  <text x="96"  y="112" font-family="serif" font-size="13" fill="#A78BFA" opacity="0.45" text-anchor="middle">&#10022;</text>
  <text x="304" y="118" font-family="serif" font-size="11" fill="#8B5CF6" opacity="0.5"  text-anchor="middle">&#10022;</text>
  <text x="135" y="56"  font-family="serif" font-size="9"  fill="#C4B5FD" opacity="0.35" text-anchor="middle">&#10023;</text>
  <text x="265" y="58"  font-family="serif" font-size="9"  fill="#A78BFA" opacity="0.35" text-anchor="middle">&#10023;</text>

  <!-- ── Wizard hat (centered) ── -->
  <polygon points="200,60 158,130 242,130" fill="#3B0764"/>
  <polygon points="200,60 158,130 242,130" fill="none" stroke="#7C3AED" stroke-width="1.4" stroke-linejoin="round"/>
  <rect x="156" y="120" width="88" height="11" rx="1.5" fill="#6D28D9"/>
  <ellipse cx="200" cy="131" rx="48" ry="11" fill="#3B0764" stroke="#7C3AED" stroke-width="1.4"/>
  <text x="200" y="100" font-family="serif" font-size="18" fill="#C4B5FD" text-anchor="middle" opacity="0.9" filter="url(#glow)">&#9733;</text>

  <!-- ── Title ── -->
  <text x="200" y="185"
        font-family="'Courier New', Courier, monospace"
        font-size="25" font-weight="bold"
        fill="url(#title-grad)"
        text-anchor="middle"
        letter-spacing="3"
        filter="url(#title-glow)">audit-wizard</text>

  <!-- ── Subtitle ── -->
  <text x="200" y="210"
        font-family="'Courier New', Courier, monospace"
        font-size="11" fill="#6B7280"
        text-anchor="middle"
        letter-spacing="0.5">ai smart contract auditing</text>

  <!-- ── Bottom accent line ── -->
  <line x1="108" y1="226" x2="292" y2="226" stroke="url(#title-grad)" stroke-width="0.6" opacity="0.45"/>

  <!-- ── Tech stack badge strip ── -->
  <text x="200" y="240"
        font-family="'Courier New', Courier, monospace"
        font-size="9" fill="#374151"
        text-anchor="middle"
        letter-spacing="0.5">TypeScript &#183; Bun &#183; Ink &#183; React</text>
</svg>
